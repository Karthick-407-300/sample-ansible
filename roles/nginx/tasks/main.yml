- name: Create app1 directory
  file:
    path: /var/www/html/app1
    state: directory

- name: Create app2 directory
  file:
    path: /var/www/html/app2
    state: directory

- name: Copy website to app1
  copy:
    src: "{{ playbook_dir }}/"
    dest: /var/www/html/app1/

- name: Copy website to app2
  copy:
    src: "{{ playbook_dir }}/"
    dest: /var/www/html/app2/

- name: Deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    validate: "nginx -t -c %s"
  notify: Restart nginx