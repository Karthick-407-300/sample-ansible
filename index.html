<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Demo - Updated</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .hero {
            padding: 120px 0;
        }

        .badge-status {
            font-size: 18px;
            padding: 10px 20px;
            border-radius: 25px;
            background-color: #28a745;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            backdrop-filter: blur(10px);
        }

        .footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-black shadow">
        <div class="container">
            <span class="navbar-brand fs-4">🚀 DevOps Pipeline Demo</span>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container text-center hero">
        <h1 class="display-2 fw-bold">🔥 Deployment Successful!</h1>
        <p class="lead mt-3">Updated automatically using Jenkins + Ansible</p>

        <div class="mt-4">
            <span class="badge-status">LIVE ON LOCALHOST ✅</span>
        </div>
    </div>

    <!-- Info Cards -->
    <div class="container">
        <div class="row text-center g-4">

            <div class="col-md-4">
                <div class="card p-4">
                    <h3>⚙️ Jenkins</h3>
                    <p>Triggered pipeline after Git push</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4">
                    <h3>📦 Ansible</h3>
                    <p>Deployed files & configured Nginx</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4">
                    <h3>🌐 Nginx</h3>
                    <p>Serving your updated website</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>🚀 CI/CD Demo | Auto Deploy Enabled</p>
    </div>

</body>
</html>
